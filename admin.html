<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Townhall</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a1a; color: #fff; padding: 24px; }
  h1 { font-size: 22px; margin-bottom: 4px; color: #4a90e2; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }
  .panel { background: #111a2e; border: 1px solid #1e3a6e; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
  .panel h2 { font-size: 15px; color: #4a90e2; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
  label { font-size: 13px; color: #aaa; display: block; margin-bottom: 6px; }
  input, textarea, select {
    width: 100%; background: #0a0a1a; border: 1px solid #2a3a5e;
    border-radius: 8px; color: #fff; padding: 10px 12px; font-size: 14px;
    margin-bottom: 14px; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 60px; }
  .opt-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .opt-row input { margin-bottom: 0; flex: 1; }
  .opt-row .lbl { width: 28px; height: 28px; border-radius: 6px; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
  .lbl-a{background:#c8372d;} .lbl-b{background:#2d8a4e;} .lbl-c{background:#c88a2d;} .lbl-d{background:#2d6ac8;}

  .btn { border: none; border-radius: 10px; padding: 12px 24px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #2a5fd8; color: #fff; }
  .btn-primary:hover { background: #3a6fe8; }
  .btn-green { background: #2d8a4e; color: #fff; }
  .btn-green:hover { background: #3aaa5e; }
  .btn-red { background: #c8372d; color: #fff; }
  .btn-red:hover { background: #e04040; }
  .btn-gray { background: #2a3a5e; color: #aaa; }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .q-list { display: flex; flex-direction: column; gap: 10px; }
  .q-item {
    background: #0a0a1a;
    border: 1px solid #1e3a6e;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .q-item.active-q { border-color: #2d8a4e; background: rgba(45,138,78,0.08); }
  .q-item-text { flex: 1; font-size: 14px; }
  .q-item-sub { font-size: 12px; color: #666; margin-top: 2px; }
  .active-badge { background: #2d8a4e; color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 700; }

  .status-bar { background: #0a0a1a; border: 1px solid #2a3a5e; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; display: flex; gap: 20px; align-items: center; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #2d8a4e; animation: blink 1s infinite; flex-shrink: 0; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
  .status-text { font-size: 13px; color: #aaa; }
  .status-text strong { color: #fff; }
</style>
</head>
<body>
<h1>Admin Panel</h1>
<div class="subtitle">Townhall Strategy — Controllo conduttore</div>

<div class="status-bar">
  <div class="status-dot"></div>
  <div class="status-text">Firebase connesso | Votanti live: <strong id="status-voters">0</strong> | Domanda attiva: <strong id="status-active">nessuna</strong></div>
</div>

<div class="panel">
  <h2>Aggiungi domanda</h2>
  <label>Testo della domanda</label>
  <textarea id="new-q-text" placeholder="Es: Quale sarà il prodotto con più crescita nel 2026?"></textarea>
  <label>Opzione A</label>
  <div class="opt-row"><div class="lbl lbl-a">A</div><input id="opt-a" placeholder="Opzione A"></div>
  <label>Opzione B</label>
  <div class="opt-row"><div class="lbl lbl-b">B</div><input id="opt-b" placeholder="Opzione B"></div>
  <label>Opzione C</label>
  <div class="opt-row"><div class="lbl lbl-c">C</div><input id="opt-c" placeholder="Opzione C"></div>
  <label>Opzione D</label>
  <div class="opt-row"><div class="lbl lbl-d">D</div><input id="opt-d" placeholder="Opzione D"></div>
  <button class="btn btn-primary" onclick="addQuestion()">+ Aggiungi domanda</button>
</div>

<div class="panel">
  <h2>Domande</h2>
  <div class="btn-row" style="margin-bottom:14px">
    <button class="btn btn-red btn-sm" onclick="stopQuestion()">⏹ Ferma tutto</button>
    <button class="btn btn-gray btn-sm" onclick="clearVotes()">🗑 Reset voti domanda attiva</button>
  </div>
  <div class="q-list" id="q-list">
    <div style="color:#555;font-size:14px">Nessuna domanda ancora. Aggiungine una sopra.</div>
  </div>
</div>

<script type="module">
import { db } from './firebase.js';
import { ref, push, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

let questions = {};
let activeQid = null;

onValue(ref(db,'active_question'), snap => {
  activeQid = snap.val();
  document.getElementById('status-active').textContent = activeQid ? ('Q'+Object.keys(questions).indexOf(activeQid)) : 'nessuna';
  renderList();
});

onValue(ref(db,'questions'), snap => {
  questions = snap.val() || {};
  renderList();
});

// Count voters from active question
onValue(ref(db,'votes'), snap => {
  const allVotes = snap.val() || {};
  if (!activeQid || !allVotes[activeQid]) { document.getElementById('status-voters').textContent = '0'; return; }
  document.getElementById('status-voters').textContent = Object.keys(allVotes[activeQid]).length;
});

function renderList() {
  const el = document.getElementById('q-list');
  const keys = Object.keys(questions);
  if (!keys.length) { el.innerHTML = '<div style="color:#555;font-size:14px">Nessuna domanda ancora.</div>'; return; }
  el.innerHTML = '';
  keys.forEach((qid, idx) => {
    const q = questions[qid];
    const isActive = qid === activeQid;
    const div = document.createElement('div');
    div.className = 'q-item' + (isActive ? ' active-q' : '');
    div.innerHTML = `
      <div class="q-item-text">
        <div>${idx+1}. ${q.text}</div>
        <div class="q-item-sub">${q.options.join(' / ')}</div>
      </div>
      ${isActive ? '<span class="active-badge">LIVE</span>' : ''}
      <button class="btn btn-green btn-sm" onclick="activateQ('${qid}')">▶ Attiva</button>
      <button class="btn btn-gray btn-sm" onclick="deleteQ('${qid}')">✕</button>`;
    el.appendChild(div);
  });
}

window.addQuestion = async function() {
  const text = document.getElementById('new-q-text').value.trim();
  const opts = ['opt-a','opt-b','opt-c','opt-d'].map(id => document.getElementById(id).value.trim()).filter(Boolean);
  if (!text || opts.length < 2) { alert('Inserisci la domanda e almeno 2 opzioni'); return; }
  const newRef = push(ref(db,'questions'));
  await set(newRef, { text, options: opts, index: Object.keys(questions).length + 1, created: Date.now() });
  document.getElementById('new-q-text').value = '';
  ['opt-a','opt-b','opt-c','opt-d'].forEach(id => document.getElementById(id).value = '');
};

window.activateQ = async function(qid) {
  await set(ref(db,'active_question'), qid);
};

window.stopQuestion = async function() {
  await set(ref(db,'active_question'), null);
};

window.deleteQ = async function(qid) {
  if (!confirm('Eliminare questa domanda?')) return;
  await remove(ref(db,'questions/'+qid));
  if (activeQid === qid) await set(ref(db,'active_question'), null);
};

window.clearVotes = async function() {
  if (!activeQid) { alert('Nessuna domanda attiva'); return; }
  if (!confirm('Reset voti della domanda attiva?')) return;
  await remove(ref(db,'votes/'+activeQid));
};
</script>
</body>
</html>
