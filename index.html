<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Townhall Vote</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0a0a1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }
  
  /* LIVE Badge in alto a destra */
  .live-badge {
    position: fixed;
    top: 12px;
    right: 12px;
    background: rgba(7, 20, 40, 0.95);
    border: 2px solid #dc2626;
    border-radius: 20px;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    z-index: 1000;
  }
  .live-dot {
    width: 8px;
    height: 8px;
    background: #dc2626;
    border-radius: 50%;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .live-count {
    color: #fff;
    font-size: 15px;
  }
  
  .logo {
    font-size: 13px;
    color: #888;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
    margin-top: 8px;
  }
  
  #waiting {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    text-align: center;
    min-height: 60vh;
    width: 100%;
  }
  #waiting .pulse {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #1a3a6e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.2); opacity: 1; }
  }
  #waiting p { color: #888; font-size: 15px; }

  #vote-section { display: none; width: 100%; max-width: 480px; }
  .question-box {
    background: #111a2e;
    border: 1px solid #1e3a6e;
    border-radius: 16px;
    padding: 24px 20px;
    margin-bottom: 24px;
    text-align: center;
  }
  
  /* Timer styles */
  .timer-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
    padding: 8px 16px;
    background: #0a0a1a;
    border-radius: 8px;
    border: 1px solid #1e3a6e;
  }
  .timer-display {
    font-size: 24px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #60a5fa;
  }
  .timer-display.warning {
    color: #f59e0b;
    animation: pulse-warning 0.5s infinite;
  }
  .timer-display.expired {
    color: #ef4444;
  }
  @keyframes pulse-warning {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .timer-icon {
    font-size: 20px;
  }
  
  .q-number {
    font-size: 12px;
    color: #4a7fd4;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .q-text {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.4;
    color: #f1f5f9;
    margin-bottom: 20px;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .opt-btn {
    background: #0a0a1a;
    border: 2px solid #1e3a6e;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    text-align: left;
    width: 100%;
  }
  .opt-btn:hover:not(.disabled) {
    border-color: #4a7fd4;
    background: #0d1f3d;
  }
  .opt-btn.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    border-color: #334155;
  }
  .letter {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 16px;
    flex-shrink: 0;
  }
  .letter-A { background: #c8372d; }
  .letter-B { background: #2d8a4e; }
  .letter-C { background: #c88a2d; }
  .letter-D { background: #2d6ac8; }
  
  .voted-A { border-color: #c8372d !important; background: rgba(200, 55, 45, 0.2) !important; }
  .voted-B { border-color: #2d8a4e !important; background: rgba(45, 138, 78, 0.2) !important; }
  .voted-C { border-color: #c88a2d !important; background: rgba(200, 138, 45, 0.2) !important; }
  .voted-D { border-color: #2d6ac8 !important; background: rgba(45, 106, 200, 0.2) !important; }
  
  #voted-msg {
    margin-top: 16px;
    padding: 12px;
    background: rgba(34, 197, 94, 0.15);
    border: 1px solid #22c55e;
    border-radius: 8px;
    color: #22c55e;
    font-size: 14px;
    font-weight: 600;
    display: none;
  }
  #expired-msg {
    margin-top: 16px;
    padding: 12px;
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid #ef4444;
    border-radius: 8px;
    color: #ef4444;
    font-size: 14px;
    font-weight: 600;
    display: none;
  }

  /* Sentiment section */
  .sentiment-section {
    width: 100%;
    max-width: 480px;
    margin-top: 20px;
  }
  .sentiment-title {
    font-size: 14px;
    color: #888;
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .emoji-container {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .emoji-btn {
    font-size: 36px;
    background: transparent;
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .emoji-btn:hover {
    transform: scale(1.15);
  }
  .emoji-btn.active {
    background: #111a2e;
    border-color: #4a7fd4;
    transform: scale(1.2);
  }
</style>
</head>
<body>

<!-- LIVE Badge -->
<div class="live-badge">
  <div class="live-dot"></div>
  <span class="live-count" id="live-count">0</span>
</div>

<div class="logo">Townhall Strategy</div>

<div id="waiting">
  <div class="pulse"></div>
  <p>In attesa della prossima domanda...</p>
</div>

<div id="vote-section">
  <div class="question-box">
    <div class="q-number" id="q-number">Domanda 1</div>
    
    <!-- Timer -->
    <div class="timer-container" id="timer-container" style="display: none;">
      <span class="timer-icon">⏱️</span>
      <span class="timer-display" id="timer-display">0:40</span>
    </div>
    
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div id="voted-msg">✓ Voto registrato!</div>
    <div id="expired-msg">⏰ Tempo scaduto - Non è più possibile votare</div>
  </div>
</div>

<div class="sentiment-section">
  <div class="sentiment-title">Come ti senti?</div>
  <div class="emoji-container">
    <button class="emoji-btn" data-val="1" onclick="voteSentiment(1)">😴</button>
    <button class="emoji-btn" data-val="2" onclick="voteSentiment(2)">😐</button>
    <button class="emoji-btn" data-val="3" onclick="voteSentiment(3)">🙂</button>
    <button class="emoji-btn" data-val="4" onclick="voteSentiment(4)">😄</button>
    <button class="emoji-btn" data-val="5" onclick="voteSentiment(5)">🔥</button>
  </div>
  <p style="text-align:center;color:#888;font-size:13px;margin-top:12px;">Il tuo sentiment aggiorna la sala in tempo reale</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKUJyfsvSvYm-Alvv8xjF39mf9fH_GR40",
  authDomain: "townhallstrategy.firebaseapp.com",
  databaseURL: "https://townhallstrategy-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "townhallstrategy",
  storageBucket: "townhallstrategy.firebasestorage.app",
  messagingSenderId: "922581580105",
  appId: "1:922581580105:web:56a85984338c470fb88298"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const userId = 'user_' + Math.random().toString(36).substr(2, 9);
const COLORS = ['A','B','C','D'];
const LETTERS = ['A','B','C','D'];

let hasVoted = false;
let activeQuestion = null;
let timerInterval = null;
let connectedUsers = 0;

// Generate unique session ID for presence tracking
const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);

// Presence tracking - improved version
const userPresenceRef = ref(db, 'connected_users/' + sessionId);
const connectedRef = ref(db, '.info/connected');

let isConnected = false;

onValue(connectedRef, (snap) => {
  const connected = snap.val();
  console.log('Firebase connection status:', connected);
  
  if (connected === true && !isConnected) {
    // We just connected
    isConnected = true;
    
    // Set presence
    set(userPresenceRef, true).then(() => {
      console.log('Presence set successfully');
      
      // Setup onDisconnect AFTER presence is set
      onDisconnect(userPresenceRef).remove().then(() => {
        console.log('onDisconnect handler registered');
      }).catch(err => {
        console.error('Failed to register onDisconnect:', err);
      });
    }).catch(err => {
      console.error('Failed to set presence:', err);
    });
  } else if (connected === false) {
    isConnected = false;
  }
});

// Count connected users - poll every 2 seconds for better reliability
function updateConnectedCount() {
  get(ref(db, 'connected_users')).then((snap) => {
    const users = snap.val() || {};
    connectedUsers = Object.keys(users).length;
    document.getElementById('live-count').textContent = connectedUsers;
    console.log('Connected users:', connectedUsers, users);
  }).catch(err => {
    console.error('Error counting users:', err);
  });
}

// Initial count
updateConnectedCount();

// Update count every 2 seconds
setInterval(updateConnectedCount, 2000);

// Also listen for changes
onValue(ref(db, 'connected_users'), (snap) => {
  const users = snap.val() || {};
  connectedUsers = Object.keys(users).length;
  document.getElementById('live-count').textContent = connectedUsers;
  console.log('Live count updated:', connectedUsers);
});

// Listen for active question
onValue(ref(db, 'active_question'), async (snap) => {
  const data = snap.val();
  
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  
  if (!data) {
    document.getElementById('waiting').style.display = 'flex';
    document.getElementById('vote-section').style.display = 'none';
    activeQuestion = null;
    hasVoted = false;
    return;
  }
  
  // Support both old format (string) and new format (object)
  const qid = data.qid || data;
  activeQuestion = { qid, ...data };
  
  const qSnap = await get(ref(db, 'questions/' + qid));
  const q = qSnap.val();
  if (!q) return;
  
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('vote-section').style.display = 'block';
  document.getElementById('q-number').textContent = 'Domanda ' + (q.index || '');
  document.getElementById('q-text').textContent = q.text;
  
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="letter letter-${COLORS[i]}">${LETTERS[i]}</span><span>${opt}</span>`;
    btn.onclick = () => castVote(qid, i, q.options.length);
    opts.appendChild(btn);
  });
  
  document.getElementById('voted-msg').style.display = 'none';
  document.getElementById('expired-msg').style.display = 'none';
  
  // Check if already voted
  const vSnap = await get(ref(db, 'votes/' + qid + '/' + userId));
  if (vSnap.exists()) {
    markVoted(vSnap.val());
  }
  
  // Start timer if duration is set
  if (data.startsAt && data.durationSeconds) {
    const durationMs = data.durationSeconds * 1000;
    const deadline = data.startsAt + durationMs;
    const timerContainer = document.getElementById('timer-container');
    const timerDisplay = document.getElementById('timer-display');
    
    timerContainer.style.display = 'flex';
    
    const updateTimer = () => {
      const now = Date.now();
      const remaining = Math.max(0, Math.floor((deadline - now) / 1000));
      
      const mins = Math.floor(remaining / 60);
      const secs = remaining % 60;
      timerDisplay.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
      
      if (remaining <= 10 && remaining > 0) {
        timerDisplay.classList.add('warning');
      } else {
        timerDisplay.classList.remove('warning');
      }
      
      if (remaining <= 0) {
        timerDisplay.classList.add('expired');
        timerDisplay.textContent = '0:00';
        clearInterval(timerInterval);
        
        // Disable voting
        if (!hasVoted) {
          document.querySelectorAll('.opt-btn').forEach(btn => {
            btn.classList.add('disabled');
          });
          document.getElementById('expired-msg').style.display = 'block';
        }
      }
    };
    
    updateTimer();
    timerInterval = setInterval(updateTimer, 1000);
  } else {
    document.getElementById('timer-container').style.display = 'none';
  }
});

async function castVote(qid, optIndex, total) {
  if (hasVoted) return;
  
  // Check if question is expired
  if (activeQuestion && activeQuestion.startsAt && activeQuestion.durationSeconds) {
    const now = Date.now();
    const deadline = activeQuestion.startsAt + (activeQuestion.durationSeconds * 1000);
    if (now > deadline) {
      return; // Too late to vote
    }
  }
  
  hasVoted = true;
  await set(ref(db, 'votes/' + qid + '/' + userId), optIndex);
  markVoted(optIndex);
}

function markVoted(optIndex) {
  document.getElementById('voted-msg').style.display = 'block';
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((b, i) => {
    b.classList.add('disabled');
    if (i === optIndex) b.classList.add('voted-' + COLORS[i]);
  });
}

window.voteSentiment = function(val) {
  set(ref(db, 'sentiment/' + userId), { value: val, ts: Date.now() });
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.emoji-btn[data-val="' + val + '"]').classList.add('active');
};
</script>
</body>
</html>
